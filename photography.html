.image-info-container {

}

@media (max-width: 600px) {

    margin-top: 10px;
    transform: none;
    left: auto;

  .image-info-container:hover img {

  }

}

// Initialize all slideshows
document.querySelectorAll(".slideshow").forEach(slideshow => {

  const name = slideshow.dataset.slideshow;
  const slides = slideshows[name];
  let index = 0;

  const img = slideshow.querySelector(".slideshow-image");
  const link = slideshow.querySelector(".slideshow-link");
  const info = slideshow.querySelector(".slideshow-info");

  function update() {
    img.src = slides[index].src;
    link.href = slides[index].link;
    info.textContent = slides[index].info;
  }

  update();

  slideshow.querySelector(".next").onclick = () => {
    index = (index + 1) % slides.length;
    update();
  };

  slideshow.querySelector(".prev").onclick = () => {
    index = (index - 1 + slides.length) % slides.length;
    update();
  };

});
