<style>
.slideshow-container {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-button {
  background: #eee;
  border: none;
  padding: 10px 14px;
  font-size: 20px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.2s ease;
}

.nav-button:hover {
  background: #ddd;
}

.image-info-container {
  position: relative;
  display: inline-block;
}

.image-info-container img {
  width: auto;
  transition: transform 0.25s ease;
}

.image-info-container:hover img {
  transform: scale(1.08);
}

.info-bar {
  position: absolute;
  top: 50%;
  left: 110%;
  transform: translateY(-50%);
  background: rgba(240, 240, 240, 0.85);
  color: #333;
  padding: 10px 15px;
  border-radius: 6px;
  opacity: 0;
  transition: opacity 0.25s ease;
  width: 200px;
  line-height: 1.3;
}

.image-info-container:hover .info-bar {
  opacity: 1;
}
</style>

<script>
const slides = [
  {
    src: "images/fotografie/auto/1.JPG",
    link: "https://raw.githubusercontent.com/RysmanMargot/Portfolio-Margot-Rysman/refs/heads/main/images/fotografie/auto/1.JPG",
    info: "After school workshop for car photography and lighting on 05/03/2025."
  },
  {
    src: "images/fotografie/auto/2.JPG",
    link: "https://raw.githubusercontent.com/RysmanMargot/Portfolio-Margot-Rysman/refs/heads/main/images/fotografie/auto/2.JPG",
    info: "After school workshop for car photography and lighting on 05/03/2025"
  },
  {
    src: "images/fotografie/auto/3.JPG",
    link: "https://raw.githubusercontent.com/RysmanMargot/Portfolio-Margot-Rysman/refs/heads/main/images/fotografie/auto/3.JPG",
    info: "After school workshop for car photography and lighting on 05/03/2025"
  },
    {
    src: "images/fotografie/auto/4.JPG",
    link: "https://raw.githubusercontent.com/RysmanMargot/Portfolio-Margot-Rysman/refs/heads/main/images/fotografie/auto/4.JPG",
    info: "After school workshop for car photography and lighting on 05/03/2025"
  },
    {
    src: "images/fotografie/auto/5.JPG",
    link: "https://raw.githubusercontent.com/RysmanMargot/Portfolio-Margot-Rysman/refs/heads/main/images/fotografie/auto/5.JPG",
    info: "After school workshop for car photography and lighting on 05/03/2025"
  }
];

let index = 0;

function updateSlide() {
  document.getElementById("slideshow-image").src = slides[index].src;
  document.getElementById("slideshow-link").href = slides[index].link;
  document.getElementById("slideshow-info").textContent = slides[index].info;
}

document.querySelector(".next").onclick = () => {
  index = (index + 1) % slides.length;
  updateSlide();
};

document.querySelector(".prev").onclick = () => {
  index = (index - 1 + slides.length) % slides.length;
  updateSlide();
};
</script>
